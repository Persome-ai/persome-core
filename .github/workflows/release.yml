name: Release

# Builds and verifies source/wheel artifacts, creates a GitHub Release, then
# publishes the separately named `personal-model` distribution to PyPI through
# Trusted Publishing. The root `persome-core` name remains an update-source
# compatibility contract for already released runtimes.
#
# Cut a release:
#   1. bump `version` in pyproject.toml + `__version__` in src/persome/__init__.py
#   2. git tag vX.Y.Z && git push origin vX.Y.Z

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.10.9"

      - name: Verify release tag is on main
        run: |
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::release tag must point to a commit reachable from origin/main"
            exit 1
          fi

      - name: Check tag matches package version
        run: |
          pkg_version="$(uv run --no-project python -c 'import tomllib;print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$pkg_version" != "$tag_version" ]; then
            echo "::error::tag $GITHUB_REF_NAME != pyproject version $pkg_version"
            exit 1
          fi
          test -f ".github/releases/${GITHUB_REF_NAME}.md"

      - name: Verify source tree
        env:
          PERSOME_LLM_MOCK: "1"
        run: |
          uv lock --check
          uv sync --all-extras --locked --no-install-project --no-build
          uv build --wheel --out-dir "$RUNNER_TEMP/persome-verify-dist" \
            --build-constraints build-constraints.txt --require-hashes
          uv pip install --python .venv/bin/python --no-deps --force-reinstall \
            "$RUNNER_TEMP"/persome-verify-dist/persome_core-*.whl
          uv export --format requirements-txt --all-extras --no-dev --locked \
            --no-emit-project --quiet --output-file "$RUNNER_TEMP/persome-runtime.txt"
          uv run --no-sync pip-audit --requirement "$RUNNER_TEMP/persome-runtime.txt" \
            --require-hashes --disable-pip --progress-spinner off
          uv run --no-sync ruff check .
          uv run --no-sync ruff format --check .
          bash -n install.sh uninstall.sh resources/*.sh
          uv run --no-sync pytest -m "not macos and not integration" -q
          uv run --no-sync python scripts/secret_scan.py
          uv run --no-sync python scripts/pii_scan.py
          uv run --no-sync python scripts/language_scan.py
          uv run --no-sync python scripts/check_doc_links.py

      - name: Synthetic MCP transport smoke
        env:
          PERSOME_LLM_MOCK: "1"
        run: |
          uv run --no-sync python scripts/sample_demo.py --no-open --port 18743 >/tmp/persome-sample.log 2>&1 &
          sample_pid=$!
          trap 'kill "$sample_pid" 2>/dev/null || true' EXIT
          attempts=30
          while (( attempts > 0 )); do
            if curl --fail --silent http://127.0.0.1:18743/health >/dev/null; then
              break
            fi
            if ! kill -0 "$sample_pid" 2>/dev/null; then
              cat /tmp/persome-sample.log
              exit 1
            fi
            attempts=$((attempts - 1))
            sleep 1
          done
          curl --fail --silent http://127.0.0.1:18743/health >/dev/null
          uv run --no-sync python scripts/verify_sample_mcp.py --url http://127.0.0.1:18743/mcp

      - name: Build sdist + wheel
        run: |
          uv build --build-constraints build-constraints.txt --require-hashes
          cd dist
          sha256sum ./*.whl ./*.tar.gz > SHA256SUMS
          sha256sum --check SHA256SUMS

      - name: Smoke-test built wheel
        run: |
          uv export --format requirements-txt --all-extras --no-dev --locked \
            --no-emit-project --quiet --output-file /tmp/persome-runtime.txt
          uv venv /tmp/persome-wheel --python 3.12
          uv pip install --python /tmp/persome-wheel/bin/python --require-hashes \
            --no-build --requirement /tmp/persome-runtime.txt
          uv pip install --python /tmp/persome-wheel/bin/python --no-deps \
            dist/persome_core-*.whl
          cd /tmp
          PERSOME_ROOT=/tmp/persome-smoke-root /tmp/persome-wheel/bin/persome --help >/dev/null
          /tmp/persome-wheel/bin/python - <<'PY'
          from importlib.resources import files

          bundled = files("persome") / "_bundled"
          for relative in (
              "build-mac-ax-helper.sh",
              "build-mac-ax-watcher.sh",
              "mac-ax-helper.swift",
              "mac-ax-watcher.swift",
              "mac-vision-ocr.swift",
              "mac-url-handlers.swift",
              "model_assets/LICENSE",
              "model_assets/three.module.js",
              "model_assets/layout.mjs",
              "model_assets/viewer.css",
              "model_assets/viewer.js",
              "model_assets/jsm/controls/OrbitControls.js",
              "model_assets/jsm/renderers/CSS2DRenderer.js",
              "ocr_models/PP-OCRv6_tiny_det/inference.pdiparams",
              "ocr_models/PP-OCRv6_tiny_rec/inference.pdiparams",
          ):
              assert (bundled / relative).is_file(), relative
          PY

      - name: Build PyPI sdist + wheel
        run: |
          uv run --no-sync python scripts/build_pypi_dist.py --out-dir pypi-dist
          cd pypi-dist
          sha256sum ./*.whl ./*.tar.gz > SHA256SUMS
          sha256sum --check SHA256SUMS

      - name: Smoke-test PyPI wheel
        run: |
          uv venv /tmp/personal-model-wheel --python 3.12
          uv pip install --python /tmp/personal-model-wheel/bin/python --require-hashes \
            --no-build --requirement /tmp/persome-runtime.txt
          uv pip install --python /tmp/personal-model-wheel/bin/python --no-deps \
            pypi-dist/personal_model-*.whl
          cd /tmp
          PERSOME_ROOT=/tmp/personal-model-smoke-root \
            /tmp/personal-model-wheel/bin/persome --help >/dev/null
          /tmp/personal-model-wheel/bin/python - <<'PY'
          from importlib.metadata import PackageNotFoundError, version
          from importlib.resources import files
          from persome import __version__

          assert version("personal-model") == __version__
          try:
              version("persome-core")
          except PackageNotFoundError:
              pass
          else:
              raise AssertionError("PyPI wheel must be named personal-model")
          bundled = files("persome") / "_bundled"
          assert (bundled / "mac-ax-helper.swift").is_file()
          assert (bundled / "mac-vision-ocr.swift").is_file()
          assert (bundled / "model_assets" / "viewer.js").is_file()
          assert (
              bundled / "ocr_models" / "PP-OCRv6_tiny_rec" / "inference.pdiparams"
          ).is_file()
          PY

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-checksums: dist/SHA256SUMS

      - name: Attest PyPI artifacts
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-checksums: pypi-dist/SHA256SUMS

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist
          path: dist/

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: pypi-dist
          path: pypi-dist/

  github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd dist
          sha256sum --check SHA256SUMS
          cd ..
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "$GITHUB_REF_NAME" \
            --notes-file ".github/releases/${GITHUB_REF_NAME}.md" \
            --verify-tag

  pypi-publish:
    needs: [build, github-release]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/personal-model
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.10.9"

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: pypi-dist
          path: pypi-dist/

      - name: Verify PyPI artifacts
        run: |
          cd pypi-dist
          sha256sum --check SHA256SUMS

      - name: Publish personal-model to PyPI
        run: uv publish pypi-dist/*.whl pypi-dist/*.tar.gz
