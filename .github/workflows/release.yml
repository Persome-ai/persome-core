name: Release

# Publishes to PyPI + creates a GitHub Release when a version tag is pushed.
#
# One-time setup (no secret needed in this repo): register this repo as a
# PyPI "trusted publisher" for the `persome-core` project —
# https://pypi.org/manage/project/persome-core/settings/publishing/
# (owner: Persome-ai, repo: persome-core, workflow: release.yml, environment: pypi).
#
# Cut a release:
#   1. bump `version` in pyproject.toml + `__version__` in src/persome/__init__.py
#   2. git tag vX.Y.Z && git push origin vX.Y.Z

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Check tag matches package version
        run: |
          pkg_version="$(uv run --no-project python -c 'import tomllib;print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$pkg_version" != "$tag_version" ]; then
            echo "::error::tag $GITHUB_REF_NAME != pyproject version $pkg_version"
            exit 1
          fi

      - name: Build sdist + wheel
        run: uv build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # OIDC for PyPI trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
