name: Release

# Builds and verifies source/wheel artifacts, then creates a GitHub Release when
# a version tag is pushed. PyPI publishing is intentionally not part of the
# public-alpha launch contract.
#
# Cut a release:
#   1. bump `version` in pyproject.toml + `__version__` in src/persome/__init__.py
#   2. git tag vX.Y.Z && git push origin vX.Y.Z

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: Check tag matches package version
        run: |
          pkg_version="$(uv run --no-project python -c 'import tomllib;print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$pkg_version" != "$tag_version" ]; then
            echo "::error::tag $GITHUB_REF_NAME != pyproject version $pkg_version"
            exit 1
          fi
          test -f ".github/releases/${GITHUB_REF_NAME}.md"

      - name: Verify source tree
        env:
          PERSOME_LLM_MOCK: "1"
        run: |
          uv lock --check
          uv sync --all-extras
          uv run ruff check .
          uv run ruff format --check .
          bash -n install.sh uninstall.sh resources/*.sh
          uv run pytest -m "not macos and not integration" -q
          uv run python scripts/secret_scan.py
          uv run python scripts/pii_scan.py
          uv run python scripts/language_scan.py
          uv run python scripts/check_doc_links.py

      - name: Synthetic MCP transport smoke
        env:
          PERSOME_LLM_MOCK: "1"
        run: |
          uv run python scripts/sample_demo.py --no-open --port 18743 >/tmp/persome-sample.log 2>&1 &
          sample_pid=$!
          trap 'kill "$sample_pid" 2>/dev/null || true' EXIT
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:18743/health >/dev/null; then
              break
            fi
            if ! kill -0 "$sample_pid" 2>/dev/null; then
              cat /tmp/persome-sample.log
              exit 1
            fi
            sleep 1
          done
          curl --fail --silent http://127.0.0.1:18743/health >/dev/null
          uv run python scripts/verify_sample_mcp.py --url http://127.0.0.1:18743/mcp

      - name: Build sdist + wheel
        run: |
          uv build
          cd dist
          sha256sum *.whl *.tar.gz > SHA256SUMS
          sha256sum --check SHA256SUMS

      - name: Smoke-test built wheel
        run: |
          uv venv /tmp/persome-wheel --python 3.11
          uv pip install --python /tmp/persome-wheel/bin/python dist/persome_core-*.whl
          cd /tmp
          PERSOME_ROOT=/tmp/persome-smoke-root /tmp/persome-wheel/bin/persome --help >/dev/null
          /tmp/persome-wheel/bin/python - <<'PY'
          from importlib.resources import files

          bundled = files("persome") / "_bundled"
          for relative in (
              "build-mac-ax-helper.sh",
              "build-mac-ax-watcher.sh",
              "mac-ax-helper.swift",
              "mac-ax-watcher.swift",
              "mac-url-handlers.swift",
              "model_assets/LICENSE",
              "model_assets/three.module.js",
              "model_assets/layout.mjs",
              "model_assets/viewer.css",
              "model_assets/viewer.js",
              "model_assets/jsm/controls/OrbitControls.js",
              "model_assets/jsm/renderers/CSS2DRenderer.js",
              "ocr_models/PP-OCRv6_tiny_det/inference.pdiparams",
              "ocr_models/PP-OCRv6_tiny_rec/inference.pdiparams",
          ):
              assert (bundled / relative).is_file(), relative
          PY

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd dist
          sha256sum --check SHA256SUMS
          cd ..
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "$GITHUB_REF_NAME" \
            --notes-file ".github/releases/${GITHUB_REF_NAME}.md" \
            --verify-tag
