name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        # ubuntu-latest: the Paddle OCR deps are skipped and the no-runtime
        # fail-open path is exercised.
        # macos-latest (arm64): full dependency set incl. local OCR runtime.
        # macos-15-intel (x86_64): Apple Vision OCR fallback + Intel install path.
        # Tests marked "macos" stay deselected in the default gate: CI has no
        # Accessibility (AX) permission, so AX-capture tests cannot run there.
        os: [ubuntu-latest, macos-latest, macos-15-intel]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.10.9"
          enable-cache: true
          # Python version is pinned by .python-version (3.12).

      - name: Sync dependencies
        run: uv sync --all-extras --locked --no-install-project --no-build

      - name: Build and install project with hash-constrained backend
        run: |
          uv build --wheel --out-dir "$RUNNER_TEMP/persome-ci-dist" \
            --build-constraints build-constraints.txt --require-hashes
          uv pip install --python .venv/bin/python --no-deps --force-reinstall \
            "$RUNNER_TEMP"/persome-ci-dist/persome_core-*.whl

      - name: Audit locked runtime dependencies
        run: |
          uv export --format requirements-txt --all-extras --no-dev --locked \
            --no-emit-project --quiet --output-file "$RUNNER_TEMP/persome-runtime.txt"
          uv run --no-sync pip-audit --requirement "$RUNNER_TEMP/persome-runtime.txt" \
            --require-hashes --disable-pip --progress-spinner off

      - name: Lint (ruff check)
        run: uv run --no-sync ruff check .

      - name: Format (ruff check)
        run: uv run --no-sync ruff format --check .

      - name: Shell syntax
        run: bash -n install.sh uninstall.sh resources/*.sh

      - name: Apple Health Swift package
        if: runner.os == 'macOS'
        run: |
          swift test --package-path connectors/apple-health
          cd connectors/apple-health
          xcodebuild -scheme PersomeAppleHealth \
            -destination 'generic/platform=iOS' \
            -derivedDataPath "$RUNNER_TEMP/persome-health-derived" \
            CODE_SIGNING_ALLOWED=NO build

      - name: Tests (offline, mocked LLM)
        # The default offline gate: no network, no API key. Markers deselected:
        #   macos       — needs real AX permission / Swift capture helpers
        #   integration — talks to real LLM providers
        env:
          PERSOME_LLM_MOCK: "1"
        run: uv run --no-sync pytest -m "not macos and not integration" -q

      - name: Real Intel Vision OCR smoke
        if: matrix.os == 'macos-15-intel'
        run: uv run --no-sync pytest tests/test_vision_ocr.py -m macos -q

      - name: PII scan
        # Hard privacy gate: the whole tree (source + test fixtures) must be
        # free of real names / emails / tokens. Must exit 0.
        run: uv run --no-sync python scripts/pii_scan.py

      - name: Secret and token scan
        run: uv run --no-sync python scripts/secret_scan.py

      - name: English-language source gate
        run: uv run --no-sync python scripts/language_scan.py

      - name: Documentation links and assets
        run: uv run --no-sync python scripts/check_doc_links.py

      - name: Synthetic MCP transport smoke
        env:
          PERSOME_LLM_MOCK: "1"
        run: |
          uv run --no-sync python scripts/sample_demo.py --no-open --port 18743 >/tmp/persome-sample.log 2>&1 &
          sample_pid=$!
          trap 'kill "$sample_pid" 2>/dev/null || true' EXIT
          attempts=30
          while (( attempts > 0 )); do
            if curl --fail --silent http://127.0.0.1:18743/health >/dev/null; then
              break
            fi
            if ! kill -0 "$sample_pid" 2>/dev/null; then
              cat /tmp/persome-sample.log
              exit 1
            fi
            attempts=$((attempts - 1))
            sleep 1
          done
          curl --fail --silent http://127.0.0.1:18743/health >/dev/null
          uv run --no-sync python scripts/verify_sample_mcp.py --url http://127.0.0.1:18743/mcp

  package:
    name: package smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.10.9"

      - name: Verify lock and build artifacts
        run: |
          uv lock --check
          uv build --build-constraints build-constraints.txt --require-hashes

      - name: Install wheel outside the checkout
        run: |
          uv export --format requirements-txt --all-extras --no-dev --locked \
            --no-emit-project --quiet --output-file /tmp/persome-runtime.txt
          uv venv /tmp/persome-wheel --python 3.12
          uv pip install --python /tmp/persome-wheel/bin/python --require-hashes \
            --no-build --requirement /tmp/persome-runtime.txt
          uv pip install --python /tmp/persome-wheel/bin/python --no-deps \
            dist/persome_core-*.whl
          cd /tmp
          PERSOME_ROOT=/tmp/persome-smoke-root /tmp/persome-wheel/bin/persome --help >/dev/null
          /tmp/persome-wheel/bin/python - <<'PY'
          from importlib.resources import files

          bundled = files("persome") / "_bundled"
          required = (
              "build-mac-ax-helper.sh",
              "build-mac-ax-watcher.sh",
              "mac-ax-helper.swift",
              "mac-ax-watcher.swift",
              "mac-vision-ocr.swift",
              "mac-url-handlers.swift",
              "model_assets/LICENSE",
              "model_assets/three.module.js",
              "model_assets/layout.mjs",
              "model_assets/viewer.css",
              "model_assets/viewer.js",
              "model_assets/jsm/controls/OrbitControls.js",
              "model_assets/jsm/renderers/CSS2DRenderer.js",
              "ocr_models/PP-OCRv6_tiny_det/inference.pdiparams",
              "ocr_models/PP-OCRv6_tiny_rec/inference.pdiparams",
          )
          for relative in required:
              assert (bundled / relative).is_file(), relative
          PY
