name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        # ubuntu-latest (x86_64): the paddle OCR deps are gated to
        # platform_machine == 'arm64' in pyproject.toml, so they are skipped
        # and the OCR-less code path is exercised.
        # macos-latest (arm64): full dependency set incl. local OCR runtime.
        # Tests marked "macos" stay deselected on BOTH runners: CI has no
        # Accessibility (AX) permission, so AX-capture tests cannot run there.
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          # Python version is pinned by .python-version (3.11).

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Lint (ruff check)
        # TODO: make this step blocking (drop continue-on-error) once the
        # lint baseline is clean. At export time `ruff check .` reports ~20
        # findings (mostly F401 unused-import, a few F821) inherited from the
        # source tree; they are tracked for cleanup and must not mask NEW
        # findings forever.
        continue-on-error: true
        run: uv run ruff check .

      # NOTE: `ruff format --check` is intentionally NOT run. The exported
      # tree has ~49 files that ruff would reformat (pre-existing baseline).
      # Reformatting wholesale would destroy git blame across the whole tree;
      # if/when the baseline is reformatted in one dedicated commit, add:
      #   - run: uv run ruff format --check .

      - name: Tests (offline, mocked LLM)
        # The default offline gate: no network, no API key. Markers deselected:
        #   macos       — needs real AX permission / Swift capture helpers
        #   integration — talks to real LLM providers
        #   eval        — LLM-judged eval harness, not a pass/fail unit gate
        # On failure, rerun only the failed tests once (--lf): a couple of
        # timing-sensitive e2e tests flake under CI load; a real regression
        # fails both passes.
        env:
          PERSOME_LLM_MOCK: "1"
        run: |
          uv run pytest -m "not macos and not integration and not eval" -q \
            || uv run pytest -m "not macos and not integration and not eval" -q --lf

      - name: PII scan
        # Hard privacy gate: the whole tree (source + test fixtures) must be
        # free of real names / emails / tokens. Must exit 0.
        run: uv run python scripts/pii_scan.py
