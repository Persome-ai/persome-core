name: Feature request
description: Suggest an idea or improvement for Persome runtime.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the underlying need, not just the solution you have in mind.
      placeholder: |
        e.g. My agent needs to know which document I was editing yesterday afternoon,
        but recall only surfaces app-level sessions.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like Persome to do? Rough sketches are fine.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you tried or thought about (including other tools).
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Which area does this touch?
      multiple: true
      options:
        - Capture (AX tree / OCR / watcher)
        - Memory pipeline (sessions / reducer / consolidation / forgetting)
        - Retrieval (hybrid search / recall / MCP tools)
        - MCP server / agent integration
        - CLI / install / doctor
        - Memory geometry visualization (/dev/memory)
        - Privacy / security
        - Other
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
    validations:
      required: false
