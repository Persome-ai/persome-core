algorithm = "Check pre-capture eligibility, resolve or compile the source-digest-keyed Swift AX helper, query frontmost window metadata, capture the focused AX tree, optionally grab and resize the primary monitor, and attach pixels only through encrypt-or-omit policy."
state = "Native helper path is keyed by architecture and source digest; the candidate stays in memory until focused normalization and commit."
failure = "A locked screen skips the candidate; AX or Screen Recording failure preserves only available metadata and never fabricates text or pixels."
files = ["src/persome/capture/scheduler.py", "src/persome/capture/ax_capture.py", "src/persome/capture/window_meta.py", "src/persome/capture/screenshot.py"]
