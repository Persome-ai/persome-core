[[stages]]
id = "privacy-pixel-gate"
label = "Privacy and pixel gate"
lane = "observation"
kind = "deterministic-gate"
order = 30
summary = "Skips collection behind a locked screen, strips content from secure-input observations while retaining metadata, removes structural placeholders, and encrypts or omits persisted pixels."
trigger = "Before capture acquisition, during candidate finalization, and when screenshot/OCR content is attached"
inputs = ["screen lock and secure-input state", "raw capture candidate", "AX placeholders", "screenshot policy and key"]
outputs = ["skipped capture or metadata-only secure observation", "placeholder-sanitized evidence", "encrypted/omitted pixel payload"]
algorithm = "Fail closed before acquisition when the screen is locked; for a focused secure field remove AX, screenshot, text, URL, and OCR opportunity but retain timestamp/window metadata; sanitize confirmed structural placeholder values; encrypt screenshots with AES-256-GCM only when a valid install-generated key exists. Secret-pattern scrubbing is a separate snapshot/export boundary, not a capture-time operation."
state = "Pixel policy and OCR choice are durable config; screenshot keys live only in the owner-only env file."
failure = "Missing/invalid screenshot key omits pixels rather than writing plaintext; a positive secure-input signal yields a persisted metadata-only record, while uncertain lock state skips the whole capture."
files = ["src/persome/capture/scheduler.py", "src/persome/capture/screen_state.py", "src/persome/capture/placeholder.py", "src/persome/capture/screenshot_crypto.py"]
symbols = ["capture_gate_reason", "is_secure_input_active", "sanitize_ax_tree", "sanitize_ocr_text", "encrypt"]
tests = ["tests/test_capture_privacy_gating.py", "tests/test_capture_retention_provenance.py", "tests/test_screenshot_crypto.py", "tests/test_storage_security.py"]

