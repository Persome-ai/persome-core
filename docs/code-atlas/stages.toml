state = "The entry follows the configured public write authority and remains distinguishable from observed or user-authored memory."
failure = "Empty content is rejected; integrity or storage failures propagate and no free-form correction, Face re-mine, or Root synthesis is attempted."
files = ["src/persome/mcp/memory_write.py", "src/persome/store/entries.py"]
symbols = ["remember", "append_entry"]
tests = ["tests/test_memory_write.py", "tests/test_mcp_tools.py"]

[[stages]]
id = "explicit-secure-erasure"
label = "Explicit secure erasure"
lane = "access"
kind = "explicit-write"
order = 40
summary = "Deletes the operator-selected capture, timeline, memory, or entire local Runtime scope across live, backup, quarantine, export, Markdown, and SQLite/FTS copies instead of deleting only the visible primary file."
trigger = "Confirmed `persome clean captures|timeline|memory|all` while the daemon is stopped"
inputs = ["selected deletion scope", "live database and sidecars", "capture/memory files", "backups and quarantines", "exports and recovery artifacts"]
outputs = ["securely purged scope", "vacuumed/truncated SQLite and FTS", "removed derived snapshots/markers", "explicit failure receipt when any retained copy cannot be scrubbed"]
algorithm = "Require stopped-daemon ownership and confirmation, remove canonical files and rows, scrub matching tables from backups/quarantines, enable SQLite/FTS secure deletion, rebuild indexes, truncate WAL, VACUUM, and delete derived model/export/recovery artifacts for the chosen scope."
state = "Erasure is an operator-only destructive boundary; scope-specific helpers count removed artifacts and never reuse normal retention as proof of secure purge."
failure = "Busy WAL, unsafe retained copies, or scrub/remove failures fail loudly; the command does not claim success while a known local copy still contains the selected data."
files = ["src/persome/cli.py", "src/persome/evomem/backup.py", "src/persome/store/fts.py"]
symbols = ["_require_stopped_for_clean", "_clean_captures", "_clean_timeline", "_clean_memory", "scrub_database_copies", "purge_deleted_content"]
tests = ["tests/test_clean_cli.py", "tests/test_storage_security.py"]

