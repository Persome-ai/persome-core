failure = "Watcher crashes or malformed lines are logged/restarted; heartbeat capture may still persist an observation but does not necessarily advance session activity."
files = ["resources/mac-ax-watcher.swift", "src/persome/capture/watcher.py", "src/persome/capture/event_dispatcher.py"]
