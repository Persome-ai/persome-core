version = 1

# This registry is deliberately semantic. The generator validates every path and
# symbol, while the descriptions below are maintained by code review.

[[lanes]]
id = "control"
label = "Control plane"
order = 0
definition = "Owns process lifetime, policy, configuration, permissions, locks, and recovery. It changes when work may run, not the person's modeled state directly."

[[lanes]]
id = "observation"
label = "Observation"
order = 1
definition = "Turns a permitted macOS or trusted-ingest signal into a bounded, source-attributed capture. These are observations, not yet durable personal claims."

[[lanes]]
id = "state"
label = "State formation"
order = 2
definition = "Compresses captures into minute blocks and independently cuts work sessions. It creates bounded temporal state without creating higher-order personal geometry."

[[lanes]]
id = "memory"
label = "Evidence-backed memory"
order = 3
definition = "Reduces bounded state, proposes semantic claims, applies deterministic evidence gates, and records Points and Lines with audit history."

[[lanes]]
id = "structure"
label = "Structural modeling"
order = 4
definition = "Induces reusable cases and progressively higher geometry from already accepted evidence: Faces, Volumes, and at most one Root."

[[lanes]]
id = "projection"
label = "Projection and retrieval"
order = 5
definition = "Builds read-only, versioned views over current and historical model state and retrieves evidence without creating a second model."

[[lanes]]
id = "access"
label = "Local access and correction"
order = 6
definition = "Exposes owner-local CLI, REST, viewer, and MCP surfaces. Read paths project state; explicit write paths remain authenticated and audited."

[[domains]]
id = "runtime-control"
label = "Runtime and lifecycle"
order = 1
definition = "CLI entry points, daemon orchestration, onboarding, lifecycle ownership, native setup, update, and diagnostics."
globs = [
  "src/persome/__init__.py",
  "src/persome/__main__.py",
  "src/persome/cli.py",
  "src/persome/daemon.py",
  "src/persome/doctor.py",
  "src/persome/integrity.py",
  "src/persome/launchagent.py",
  "src/persome/ocr_setup.py",
  "src/persome/onboarding.py",
  "src/persome/runtime_pid.py",
  "src/persome/updater.py",
]

[[domains]]
id = "configuration"
label = "Configuration and observability"
order = 2
definition = "Path authority, typed configuration, secret-file loading, provider selection, structured logs, and request correlation."
globs = [
  "src/persome/config.py",
  "src/persome/env_file.py",
  "src/persome/llm_setup.py",
  "src/persome/logger.py",
  "src/persome/paths.py",
  "src/persome/providers.py",
  "src/persome/trace.py",
]

[[domains]]
id = "observation"
label = "Capture, parsers, and privacy"
order = 3
definition = "Native AX/OCR observation, app-specific parsing, screenshot policy, privacy scrubbing, capture commit, and retention."
globs = [
  "src/persome/capture/*.py",
  "src/persome/parsers/*.py",
  "src/persome/privacy/*.py",
]

[[domains]]
id = "state-formation"
label = "Timeline and session state"
order = 4
definition = "Minute-window normalization, attention metadata, deterministic session boundary state, persisted watermarks, ticks, and recovery."
globs = [
  "src/persome/timeline/*.py",
  "src/persome/session/*.py",
]

[[domains]]
id = "semantic-writing"
label = "Reducers and model writers"
order = 5
definition = "LLM-mediated proposals, deterministic memory gates/application, pattern/case/schema synthesis, corrections, compaction, and model-stage utilities."
globs = [
  "src/persome/writer/*.py",
  "src/persome/prompts/*.py",
]

[[domains]]
id = "storage-evolution"
label = "Storage and evolution graph"
order = 6
definition = "SQLite/FTS/Markdown persistence, evomem bitemporal chains, identity, relation evidence, projections, integrity, backup, and restore."
globs = [
  "src/persome/store/*.py",
  "src/persome/evomem/*.py",
]

[[domains]]
id = "model-projection"
label = "Model build and snapshot"
order = 7
definition = "Locked structural-build coordination, reproducibility manifest, model-source adapters, snapshot validation, export, and status."
globs = [
  "src/persome/model/*.py",
  "src/persome/vectors_tick.py",
]

[[domains]]
id = "local-access"
label = "Retrieval, API, MCP, and security"
order = 8
definition = "Hybrid/associative retrieval, provenance chains, owner-local HTTP and MCP tools, request limits, bearer/capability security, and explicit writes."
globs = [
  "src/persome/api/*.py",
  "src/persome/mcp/*.py",
  "src/persome/retrieval/*.py",
  "src/persome/security/*.py",
]

[[statuses]]
id = "production"
label = "default production path"
definition = "Imported by the default Runtime path or a shared implementation used by it."
default = true
globs = []

[[statuses]]
id = "conditional"
label = "operator-triggered or feature-gated"
definition = "Real production/operations code reached only by an explicit command, recovery flow, or disabled-by-default/configured feature."
default = false
globs = [
  "src/persome/doctor.py",
  "src/persome/integrity.py",
  "src/persome/launchagent.py",
  "src/persome/llm_setup.py",
  "src/persome/ocr_setup.py",
  "src/persome/onboarding.py",
  "src/persome/updater.py",
  "src/persome/vectors_tick.py",
  "src/persome/evomem/as_of.py",
  "src/persome/evomem/backfill.py",
  "src/persome/evomem/backup.py",
  "src/persome/evomem/edge_audit.py",
  "src/persome/evomem/relation_extractor.py",
  "src/persome/evomem/restore.py",
  "src/persome/evomem/retype.py",
  "src/persome/store/contradictions.py",
  "src/persome/store/index_md.py",
  "src/persome/writer/compact.py",
  "src/persome/writer/contradiction_check.py",
  "src/persome/writer/correct.py",
  "src/persome/writer/memory_decay.py",
  "src/persome/writer/orphan_reaper.py",
]

[[statuses]]
id = "compatibility"
label = "compatibility or debug path"
definition = "Retained for an older configuration/data shape or a narrow diagnostic entrance; not the documented default writer."
default = false
globs = [
  "src/persome/writer/classifier.py",
  "src/persome/writer/chat_extractor.py",
]

[[statuses]]
id = "tooling"
label = "repository tooling"
definition = "Imported by maintenance scripts/tests rather than the live Runtime."
default = false
globs = [
  "src/persome/store/schema_dump.py",
]

[[statuses]]
id = "dormant-public"
label = "dormant or public-only adapter"
definition = "No current internal live caller was found; kept as a public adapter, legacy surface, or candidate for explicit keep/remove review."
default = false
globs = [
  "src/persome/evomem/reconciler.py",
  "src/persome/model/schema_reader.py",
]

[[stages]]
id = "startup-recovery"
label = "Startup integrity and recovery gate"
lane = "control"
kind = "deterministic-gate"
order = 5
summary = "Before an offline CLI opens mutable Runtime state or starts the daemon, resolves incomplete recovery journals and repairs or quarantines a damaged config/database under one explicit authority decision."
trigger = "CLI `_init`, only when no daemon owns the Runtime lock"
inputs = ["config TOML", "live SQLite plus WAL/SHM", "verified backups", "Markdown memory", "recovery journals", "last model manifest"]
outputs = ["healthy or recovered Runtime state", "forensic quarantine copy", "recovery journal/marker", "rebuilt retrieval projection", "invalidated derived geometry when authority changed"]
algorithm = "Parse config and run a capped SQLite integrity check; repair purely derived FTS damage in place, otherwise journal the phase, invalidate the model manifest, quarantine the live DB, restore the newest verified backup, resolve Markdown versus evomem authority, rebuild projections, and clear regenerable geometry whose evidence source changed."
state = "The pending recovery journal is a durable fail-closed gate for memory writes, model builds, and Runtime start until recovery converges or an operator resolves authority."
failure = "A failed real recovery keeps the journal and forensic artifacts instead of guessing between divergent authorities; live-daemon initialization does not race this offline repair path."
files = ["src/persome/cli.py", "src/persome/integrity.py", "src/persome/model/build.py", "src/persome/evomem/backup.py", "src/persome/evomem/integrity.py"]
symbols = ["_init", "check_and_recover", "run_model_build", "verify_snapshot"]
tests = ["tests/test_integrity.py", "tests/test_cli_lifecycle.py", "tests/test_model_snapshot.py"]

[[stages]]
id = "runtime-orchestration"
label = "Daemon task registry"
lane = "control"
kind = "orchestration"
order = 10
summary = "Starts exactly the configured capture, state, model, maintenance, and local-access loops and makes their enablement visible in one registry."
trigger = "`persome start`, foreground daemon run, or LaunchAgent ownership"
inputs = ["typed `Config`", "capture-only flag", "runtime generation and ownership locks"]
outputs = ["named asyncio tasks", "owner-only runtime-state receipt", "graceful or bounded shutdown"]
algorithm = "Build a declarative `TaskDefinition` registry, evaluate each enable predicate, create named asyncio tasks, attach crash callbacks, and cancel/drain them under a bounded shutdown deadline."
state = "One daemon holds `.daemon.lock`; `.runtime-state.json` binds PID to a random generation. Task loops own their narrower locks/watermarks."
failure = "Unexpected task exits are logged; MCP restarts with exponential backoff; ambiguous live ownership fails closed instead of starting a second writer."
files = ["src/persome/daemon.py", "src/persome/session/tick.py", "src/persome/timeline/tick.py"]
symbols = ["TaskDefinition", "_build_task_registry", "_create_tasks_from_registry", "run_daily_safety_net"]
tests = ["tests/test_daemon.py", "tests/test_daemon_teardown.py", "tests/test_tick_retention_wiring.py"]

[[stages]]
id = "lifecycle-policy"
label = "Configuration, paths, permission, and lifecycle authority"
lane = "control"
kind = "deterministic-gate"
order = 20
summary = "Defines where Runtime state may live, which capture policy is effective, which native principals need permission, and which process may be signaled or replaced."
trigger = "CLI/onboarding/update/lifecycle request or daemon preflight"
inputs = ["`config.toml`", "owner-only `env`", "macOS permission probes", "PID/process/LaunchAgent receipts"]
outputs = ["resolved runtime policy", "private paths and tokens", "permission/readiness receipts", "safe lifecycle action"]
algorithm = "Resolve typed config and secrets separately; derive all paths through `paths.py`; revalidate user, executable, start time, generation, and LaunchAgent ownership before signaling; update by atomic same-filesystem venv exchange with rollback markers."
state = "Owner-only config/env/state files, immutable source-digest native helpers, daemon/update/model locks, and fsynced update transaction markers."
failure = "Invalid tokens, unsafe bind hosts, missing permissions, or ambiguous process identity stop the privileged action while leaving local data intact."
files = ["src/persome/config.py", "src/persome/paths.py", "src/persome/onboarding.py", "src/persome/runtime_pid.py", "src/persome/updater.py", "src/persome/security/auth.py"]
symbols = ["Config", "ensure_dirs", "onboard", "ProcessIdentity", "UpdateTransaction", "LocalAPIAuthMiddleware"]
tests = ["tests/test_config.py", "tests/test_onboarding.py", "tests/test_cli_lifecycle.py", "tests/test_updater.py", "tests/test_local_api_auth.py"]

[[stages]]
id = "daily-maintenance"
label = "Daily recovery, projection, forgetting, and survivability"
lane = "control"
kind = "orchestration"
order = 30
summary = "Runs the production daily safety sequence that closes stranded work, repairs the retrieval projection, applies optional forgetting/contradiction policy, bounds operational state, and verifies recoverability."
trigger = "Configured local daily safety-net time (23:55 by default), including capture-only mode"
inputs = ["open/pending session state", "current evo_nodes and entries projections", "contradiction/decay/orphan feature gates", "WAL, telemetry, backup, integrity, and projection receipts"]
outputs = ["force-ended/caught-up sessions", "rebuilt evomem-to-entries projection", "optional contradiction/decay/orphan mutations", "truncated WAL and telemetry", "verified backup/integrity/edit findings"]
algorithm = "In order: force-end the open session and run writer catch-up; rebuild entries/FTS from evomem when delta apply is active; optionally mark contradictions, decay old never-read clusters, and retire orphan Points; truncate the WAL; prune parser/retrieval telemetry; optionally create a verified retained backup and run integrity handling; finally detect manual edits under evomem authority."
state = "Each mutation keeps its own receipts/status; feature gates default conservative, backups have retention, integrity may freeze writes, and failures are logged per side channel so later maintenance can continue."
failure = "Most tail substages fail open to the remainder of the tick and never fabricate replacement state. An exception from force-end or writer catch-up skips that day's entire maintenance tail, and there is no durable missed-run journal. Projection also runs before optional orphan retirement; these ordering/recovery boundaries are recorded as verified gaps."
files = ["src/persome/session/tick.py", "src/persome/store/entries.py", "src/persome/writer/contradiction_check.py", "src/persome/writer/memory_decay.py", "src/persome/writer/orphan_reaper.py", "src/persome/store/fts.py", "src/persome/evomem/backup.py", "src/persome/evomem/integrity.py", "src/persome/evomem/inversion.py"]
symbols = ["run_daily_safety_net", "_rebuild_from_evo_nodes", "run_contradiction_check", "run_memory_decay", "run_orphan_reap", "checkpoint", "run_daily_backup", "check_and_handle", "run_daily_manual_edit_check"]
tests = ["tests/test_session_tick.py", "tests/test_memory_decay.py", "tests/test_orphan_reaper.py", "tests/test_evomem_survivability.py", "tests/test_contradiction_check.py", "tests/test_evomem/test_inversion_manual_edit.py", "tests/test_tick_retention_wiring.py"]

[[stages]]
id = "ax-event-gate"
label = "AX event debounce and dedup"
lane = "observation"
kind = "deterministic"
order = 10
summary = "Converts high-frequency macOS Accessibility notifications into bounded capture triggers without treating repeated UI noise as new evidence."
